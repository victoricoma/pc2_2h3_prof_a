<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <title>Formulário de Contato</title>
</head>
<style>
    .formulario {
        background-color: #30dd5d;
        border-radius: 20px;
        width: 600px;
        padding: 20px;
        margin-left: auto;
        margin-right: auto;
        margin-top: 10px;
    }

    .btn {
        background-color: aquamarine;
        color: green;
        border-radius: 20px;
        width: 120px;
        height: 40px;
        font-size: 20px;
        text-align: center;
        margin-left: auto;
        margin-right: auto;
        margin-top: 20px;
    }
</style>

<body style="font-family: Montserrat;">
    <header>
        <!--Barra de Navegação-->
        <section id="navegacao">
            <nav>
                <ul>
                    <li>
                        <a href="/index.html#home">Home</a>
                    </li>
                    <li>
                        <a href="/index.html#sobrenos">Sobre nós</a>
                    </li>
                    <li>
                        <a href="/index.html#noticias">Notícias</a>
                    </li>
                    <li>
                        <a href="/index.html#empresas">Empresas</a>
                    </li>
                </ul>
            </nav>
        </section>

    </header>
    <main>
        <form action="">
            <div class="formulario">
                <p>
                    <label for="nome">Nome: </label>
                    <input type="text" placeholder="Digite seu nome" id="nome">
                </p>
                <p>
                    <label for="email">E-Mail: </label>
                    <input type="email" placeholder="Entre com e-mail de contato" id="email">
                </p>
            </div>
            <div class="formulario">
                <p>
                    <label for="mensagem">Mensagem: </label><br />
                    <textarea id="mensagem">
                </textarea>
                </p>
                <p>
                    <select name="opcao" id="tipo_mensagem">
                        <option value="">Escolha uma Opção</option>
                        <option value="elogio">Elogio</option>
                        <option value="ajuda">Ajuda</option>
                        <option value="talentos">Talentos</option>
                        <option value="documentos">Documentos</option>
                    </select>
                </p>
            </div>
            <div class="formulario">
                <input class="btn" type="button" value="Enviar">
            </div>

        </form>
    </main>
    <footer>
        <table style="width: 100%; height: 90px; text-align: center;">
            <tr>
                <td>Atualizado em março de 2026</td>
                <td>Todos os diretos reservados à 2H3 Etec Matão</td>
                <td>Rua Cesário Motta, 644 Centro: Matão - SP, 15990-050</td>
            </tr>
        </table>
    </footer>
</body>

</html>
